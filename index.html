<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#e54646" />
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="icons/icon-192.png" />

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <title>Garage Log</title>
</head>
<body class="bg-light">
  <div class="container py-4">
    <header class="text-center mb-4">
      <h1 class="mb-2">Garage Log</h1>
      <p class="text-muted">Histórico de manutenções e mods dos seus veículos</p>
    </header>

    <section class="card shadow-sm mb-4">
      <div class="card-body">
        <h2 class="h5 mb-3">Adicionar Veículo na Garagem</h2>
        <form id="vehicle-form" class="row g-2">
          <div class="col-md-3">
            <input type="text" id="v-brand" class="form-control" placeholder="Marca (Ex: Kawasaki)" required />
          </div>
          <div class="col-md-3">
            <input type="text" id="v-model" class="form-control" placeholder="Modelo (Ex: Ninja 300)" required />
          </div>
          <div class="col-md-2">
            <input type="number" id="v-year" class="form-control" placeholder="Ano (Ex: 2026)" required />
          </div>
          <div class="col-md-2">
            <select id="v-type" class="form-select" required>
              <option value="Carro">Carro</option>
              <option value="Moto">Moto</option>
            </select>
          </div>
          <div class="col-md-2">
            <button type="submit" class="btn btn-dark w-100 mt-0">Adicionar</button>
          </div>
        </form>
        <div id="vehicles-list" class="mt-3 d-flex gap-2 flex-wrap"></div>
      </div>
    </section>

    <section class="card shadow-sm mb-4">
      <div class="card-body">
        <h2 id="form-title" class="h4 mb-3">Novo Serviço / Modificação</h2>

        <form id="entry-form">
          <input type="hidden" id="entry-id" />

          <div class="mb-3">
            <label for="vehicleId" class="form-label">Selecione o Veículo</label>
            <select id="vehicleId" class="form-select" required>
              <option value="">Carregando veículos...</option>
            </select>
          </div>

          <div class="mb-3">
            <label for="title" class="form-label">Serviço</label>
            <input type="text" id="title" class="form-control" placeholder="Ex: Troca de óleo, Instalação de LED, Difusor..." required />
          </div>

          <div class="mb-3">
            <label for="description" class="form-label">Detalhes</label>
            <textarea id="description" rows="3" class="form-control" placeholder="Peças usadas, valores, mecânica..." required></textarea>
          </div>

          <div class="mb-3">
            <label for="happenedAt" class="form-label">Data</label>
            <input type="datetime-local" id="happenedAt" class="form-control" required />
          </div>

          <div class="d-flex gap-2 flex-wrap">
            <button type="submit" class="btn btn-primary">Salvar Serviço</button>
            <button type="button" id="cancel-edit" class="btn btn-secondary hidden">Cancelar</button>
          </div>
        </form>

        <p id="message" class="mt-3 mb-0 text-success fw-bold"></p>
      </div>
    </section>

    <section class="card shadow-sm">
      <div class="card-body">
        <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
          <h2 class="h4 mb-0">Histórico da Garagem</h2>
          <button id="reload-btn" class="btn btn-outline-secondary">Atualizar</button>
        </div>

        <div id="entries-list"></div>
      </div>
    </section>
  </div>

  <script src="app.js"></script>
</body>
</html>
